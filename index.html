<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Liquid Water Upgrade</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:radial-gradient(circle at center,#081826,#000814);
}
canvas{display:block;}
button{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#00cfff;
  color:white;
  font-size:16px;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<button onclick="pouring=!pouring">水を出す / 止める</button>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();addEventListener("resize",resize);

const container={
  x:W/2-120,
  y:H/2-180,
  w:240,
  h:360
};

let particles=[];
let pouring=false;

class Particle{
  constructor(x,y){
    this.x=x;
    this.y=y;
    this.vx=(Math.random()-.5)*0.5;
    this.vy=0;
    this.r=4;
  }

  update(){
    this.vy+=0.2;

    // 粘性（減速）
    this.vx*=0.99;
    this.vy*=0.995;

    this.x+=this.vx;
    this.y+=this.vy;

    // 壁
    if(this.x<container.x){this.x=container.x;this.vx*=-0.3;}
    if(this.x>container.x+container.w){this.x=container.x+container.w;this.vx*=-0.3;}
    if(this.y>container.y+container.h){
      this.y=container.y+container.h;
      this.vy*=-0.2;
    }
  }
}

function updatePhysics(){

  if(pouring){
    for(let i=0;i<5;i++){
      particles.push(new Particle(W/2,container.y-20));
    }
  }

  // 🔥 液体らしさの核心：粒子間相互作用
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      let a=particles[i];
      let b=particles[j];

      let dx=b.x-a.x;
      let dy=b.y-a.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      let range=20;

      if(dist<range && dist>0){

        let nx=dx/dist;
        let ny=dy/dist;

        // 圧力（近すぎると反発）
        let pressure=(range-dist)/range*0.15;
        a.vx-=nx*pressure;
        a.vy-=ny*pressure;
        b.vx+=nx*pressure;
        b.vy+=ny*pressure;

        // 表面張力（少し引き合う）
        let cohesion=0.002;
        a.vx+=nx*cohesion;
        a.vy+=ny*cohesion;
        b.vx-=nx*cohesion;
        b.vy-=ny*cohesion;

        // 粘性（速度平均化）
        let viscosity=0.05;
        let dvx=b.vx-a.vx;
        let dvy=b.vy-a.vy;
        a.vx+=dvx*viscosity;
        a.vy+=dvy*viscosity;
        b.vx-=dvx*viscosity;
        b.vy-=dvy*viscosity;
      }
    }
  }

  particles.forEach(p=>p.update());
}

function draw(){

  ctx.clearRect(0,0,W,H);

  // 容器
  ctx.strokeStyle="#aaa";
  ctx.lineWidth=6;
  ctx.strokeRect(container.x,container.y,container.w,container.h);

  // 🔥 ぼかし合成で水を一体化
  ctx.globalCompositeOperation="lighter";
  ctx.shadowBlur=20;
  ctx.shadowColor="rgba(0,180,255,0.8)";
  ctx.fillStyle="rgba(0,180,255,0.4)";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  ctx.globalCompositeOperation="source-over";
  ctx.shadowBlur=0;
}

function loop(){
  updatePhysics();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
